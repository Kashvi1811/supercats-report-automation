services:
  - type: web
    name: supercats-report-automation
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: output-cache
      mountPath: /data
      sizeGB: 1
